<div class="auth-wrapper">
  <div class="background-canvas" style="background-image: url('auth-bg.png?v=2')"></div>
  
  <div class="auth-container">
    <mat-card class="auth-card glass-panel">
      <!-- Back Button -->
      <button mat-icon-button class="back-btn" routerLink="/" matTooltip="Return Home">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <div class="auth-header">
        <div class="auth-brand">
          <div class="brand-glow"></div>
          <img src="favicon.png" alt="Cloud Pallet Logo" class="brand-icon">
        </div>
        <h1 class="brand-title">CLOUD<span class="highlight">PALLET</span></h1>
        <p class="brand-subtitle">Warehouse Management System</p>
      </div>

      <mat-card-content>
        <!-- Loading Progress Bar -->
        <mat-progress-bar *ngIf="isLoading()" mode="indeterminate" class="auth-progress"></mat-progress-bar>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
          <mat-form-field appearance="outline" class="w-full form-field-glass">
            <mat-label>Email Address</mat-label>
            <mat-icon matPrefix>mail</mat-icon>
            <input matInput formControlName="email" type="email" required [readonly]="isLoading()">
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full form-field-glass relative-z">
            <mat-label>Password</mat-label>
            <mat-icon matPrefix>lock</mat-icon>
            <input matInput formControlName="password" type="password" required [readonly]="isLoading()">
          </mat-form-field>

          <!-- Waking Up Hint -->
          <div class="waking-up-hint" *ngIf="isWakingUp()">
            <mat-icon class="spin-icon">hourglass_empty</mat-icon>
            <span>Server is waking up, please wait...</span>
          </div>

          <div class="form-actions mt-2">
            <button mat-flat-button color="primary" type="submit" 
                    [disabled]="loginForm.invalid || isLoading()" 
                    class="login-btn w-full btn-glow">
              <mat-icon *ngIf="!isLoading()">login</mat-icon>
              <mat-icon *ngIf="isLoading()" class="spin-icon">sync</mat-icon>
              <span>{{ isLoading() ? 'Signing In...' : 'Sign In' }}</span>
            </button>
          </div>
        </form>
      </mat-card-content>

      <mat-card-actions class="auth-footer">
        <p class="register-prompt">
          New to Cloud Pallet? 
          <a routerLink="/register" class="link-highlight">Create an account</a>
        </p>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
