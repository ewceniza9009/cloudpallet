<div class="auth-wrapper">
  <div class="background-canvas" style="background-image: url('auth-bg.png?v=2')"></div>
  
  <div class="auth-container register-container">
    <mat-card class="auth-card glass-panel">
      <!-- Back Button -->
      <button mat-icon-button class="back-btn" routerLink="/" matTooltip="Return Home">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <div class="auth-header">
        <div class="auth-brand">
          <div class="brand-glow"></div>
          <mat-icon class="brand-material-icon">person_add</mat-icon>
        </div>
        <h1 class="brand-title">CREATE <span class="highlight">ACCOUNT</span></h1>
        <p class="brand-subtitle">Join the Cloud Pallet Network</p>
      </div>

      <mat-card-content>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
          <div class="form-grid">
            <mat-form-field appearance="outline" class="form-field-glass">
              <mat-label>First Name</mat-label>
              <input matInput formControlName="firstName" required>
            </mat-form-field>

            <mat-form-field appearance="outline" class="form-field-glass">
              <mat-label>Last Name</mat-label>
              <input matInput formControlName="lastName" required>
            </mat-form-field>
          </div>

          <mat-form-field appearance="outline" class="w-full form-field-glass">
            <mat-label>Email Address</mat-label>
            <mat-icon matPrefix>mail</mat-icon>
            <input matInput formControlName="email" type="email" required>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full form-field-glass relative-z">
            <mat-label>Password</mat-label>
            <mat-icon matPrefix>lock</mat-icon>
            <input matInput formControlName="password" type="password" required>
          </mat-form-field>

          <div class="form-actions mt-2">
            <button mat-flat-button color="primary" type="submit" [disabled]="registerForm.invalid" class="login-btn w-full btn-glow">
              <mat-icon>app_registration</mat-icon>
              <span>Register</span>
            </button>
          </div>
        </form>
      </mat-card-content>

      <mat-card-actions class="auth-footer">
        <p class="register-prompt">
          Already have an account? 
          <a routerLink="/login" class="link-highlight">Sign in instead</a>
        </p>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
